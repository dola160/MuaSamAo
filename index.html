    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f8fafc;
        }
        /* Custom scrollbar to look sleek */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f5f9;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
    </style>
</head>
<body class="text-slate-800 antialiased min-h-screen flex flex-col">

    <!-- APP CONTAINER (Max-width for desktop view, centered, mimics professional app layout on large screens) -->
    <div class="w-full max-w-md md:max-w-xl lg:max-w-2xl mx-auto bg-white min-h-screen shadow-2xl flex flex-col relative pb-20">
        
        <!-- HEADER CHUNG / THANH TRÊN CÙNG CỐ ĐỊNH (Sẽ thay đổi nhẹ theo từng trang) -->
        <header id="app-header" class="sticky top-0 z-50 bg-white border-b border-slate-100 px-4 py-3 shadow-sm transition-all duration-300">
            <!-- NỘI DUNG HEADER SẼ ĐƯỢC GENERATE ĐỘNG THEO TRANG -->
        </header>

        <!-- CONTAINER CHỨA NỘI DUNG CHÍNH CỦA CÁC TRANG -->
        <main id="app-content" class="flex-grow p-4">
            <!-- Các trang sẽ được render bằng Javascript vào đây -->
        </main>

        <!-- THÔNG BÁO POPUP CUSTOM (Thay thế alert) -->
        <div id="toast-message" class="fixed bottom-24 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-5 py-3 rounded-full shadow-lg flex items-center space-x-2 opacity-0 pointer-events-none transition-all duration-300 transform translate-y-2 z-50">
            <span id="toast-icon"></span>
            <span id="toast-text" class="text-sm font-medium"></span>
        </div>

        <!-- MENU DƯỚI CÙNG (NAVIGATION BAR) -->
        <nav id="bottom-nav" class="fixed bottom-0 left-0 right-0 max-w-md md:max-w-xl lg:max-w-2xl mx-auto bg-white border-t border-slate-100 py-2 px-6 flex justify-around items-center z-40 shadow-[0_-4px_12px_rgba(0,0,0,0.03)]">
            <button onclick="navigateTo('home')" class="nav-btn flex flex-col items-center space-y-1 text-red-500" data-page="home">
                <i data-lucide="home" class="w-6 h-6"></i>
                <span class="text-[10px] font-medium">Trang chủ</span>
            </button>
            <button onclick="navigateTo('search-page')" class="nav-btn flex flex-col items-center space-y-1 text-slate-400 hover:text-red-500" data-page="search-page">
                <i data-lucide="search" class="w-6 h-6"></i>
                <span class="text-[10px] font-medium">Tìm kiếm</span>
            </button>
            <button onclick="navigateTo('cart')" class="nav-btn flex flex-col items-center space-y-1 text-slate-400 hover:text-red-500 relative" data-page="cart">
                <i data-lucide="shopping-cart" class="w-6 h-6"></i>
                <span id="cart-badge-nav" class="absolute -top-1 -right-1 bg-red-500 text-white text-[9px] font-bold rounded-full h-4 w-4 flex items-center justify-center">0</span>

            </button>
            <button onclick="showToast('Tính năng Hồ Sơ đang được cập nhật!', 'info')" class="flex flex-col items-center space-y-1 text-slate-400 hover:text-red-500">

                <span class="text-[10px] font-medium">Tôi</span>
            </button>

        // --- ĐỊNH DẠNG TIỀN TỆ ---
        function formatCurrency(amount) {
            return new Intl.NumberFormat('vi-VN', { style: 'currency', currency: 'VND' }).format(amount).replace('₫', '₫');
        }

        // --- HIỂN THỊ TOAST THÔNG BÁO ---
        function showToast(text, type = 'success') {
            const toast = document.getElementById('toast-message');
            const toastText = document.getElementById('toast-text');
            const toastIcon = document.getElementById('toast-icon');

            toastText.innerText = text;
            if (type === 'success') {
                toastIcon.innerHTML = `<i data-lucide="check-circle" class="w-5 h-5 text-emerald-400"></i>`;
                toast.className = "fixed bottom-24 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-5 py-3 rounded-full shadow-lg flex items-center space-x-2 opacity-100 z-50 transform translate-y-0 transition-all duration-300";
            } else if (type === 'info') {
                toastIcon.innerHTML = `<i data-lucide="info" class="w-5 h-5 text-blue-400"></i>`;
                toast.className = "fixed bottom-24 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-5 py-3 rounded-full shadow-lg flex items-center space-x-2 opacity-100 z-50 transform translate-y-0 transition-all duration-300";
            } else {
                toastIcon.innerHTML = `<i data-lucide="alert-triangle" class="w-5 h-5 text-rose-400"></i>`;
                toast.className = "fixed bottom-24 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-5 py-3 rounded-full shadow-lg flex items-center space-x-2 opacity-100 z-50 transform translate-y-0 transition-all duration-300";
            }
            lucide.createIcons();

            setTimeout(() => {
                toast.className = "fixed bottom-24 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-5 py-3 rounded-full shadow-lg flex items-center space-x-2 opacity-0 pointer-events-none z-50 transform translate-y-2 transition-all duration-300";
            }, 2500);
        }

        // --- TÍNH TOÁN TỔNG SỐ LƯỢNG GIỎ HÀNG ---
        function updateCartBadge() {
            const count = state.cart.reduce((sum, item) => sum + item.quantity, 0);
            const badges = [document.getElementById('cart-badge-nav'), document.getElementById('cart-badge-header')];
            badges.forEach(badge => {
                if (badge) {
                    badge.innerText = count;
                    if (count > 0) {
                        badge.classList.remove('hidden');
                    } else {
                        badge.classList.add('hidden');
                    }
                }
            });
        }

        // --- HÀM ĐIỀU HƯỚNG CHÍNH ---
        function navigateTo(page, params = null) {
            state.currentPage = page;
            
            // Xử lý highlight menu dưới cùng
            document.querySelectorAll('.nav-btn').forEach(btn => {
                const btnPage = btn.getAttribute('data-page');
                if (btnPage === page) {
                    btn.classList.add('text-red-500');
                    btn.classList.remove('text-slate-400');
                } else {
                    btn.classList.add('text-slate-400');
                    btn.classList.remove('text-red-500');
                }
            });

            // Ẩn thanh menu dưới nếu ở một số trang đặc biệt như chi tiết/thanh toán/tìm kiếm
            const bottomNav = document.getElementById('bottom-nav');
            if (['search-page', 'detail', 'checkout', 'add-bank'].includes(page)) {
                bottomNav.classList.add('hidden');
            } else {
                bottomNav.classList.remove('hidden');
            }

            if (params) {
                if (page === 'detail') state.selectedProduct = params;
            }

            renderHeader();
            renderContent();
            updateCartBadge();
            window.scrollTo({ top: 0, behavior: 'smooth' });
            lucide.createIcons();
        }

                                <span id="cart-badge-header" class="absolute top-1 right-1 bg-red-500 text-white text-[9px] font-bold rounded-full h-4 w-4 flex items-center justify-center ${cartCount > 0 ? '' : 'hidden'}">${cartCount}</span>
                            </button>
                        </div>
                    `;
                    break;

                    headerHTML = `

        // --- HÀM QUAY LẠI THÔNG MINH ---
        function navigateBack() {
            if (state.currentPage === 'checkout') {
                navigateTo('cart');
            } else if (state.currentPage === 'detail') {
                navigateTo('search-results');
            } else if (state.currentPage === 'search-results') {
                navigateTo('search-page');
            } else {
                navigateTo('home');
            }
        }

        // --- THỰC HIỆN TÌM KIẾM ---
        function triggerSearch(keyword) {
            if (!keyword.trim()) return;
            // Thêm vào lịch sử nếu chưa có
            if (!state.searchHistory.includes(keyword)) {
                state.searchHistory.unshift(keyword);
                if (state.searchHistory.length > 8) state.searchHistory.pop();
            }
            navigateTo('search-results');
        }

        function triggerSmartSearch() {
            showToast("Bắt đầu Tìm kiếm thông minh bằng giọng nói & hình ảnh...", "info");
            setTimeout(() => {
                triggerSearch("Đôi giày");
            }, 1200);
        }

        function clearHistory() {
            state.searchHistory = [];
            renderContent();
        }

        function shareProduct() {
            showToast("Đã sao chép liên kết sản phẩm thành công!", "success");
        }

        // --- QUẢN LÝ GIỎ HÀNG ---
        function addToCart(product, qty) {
            const existingItem = state.cart.find(item => item.product.id === product.id);
            if (existingItem) {
                existingItem.quantity += qty;
            } else {
                state.cart.push({
                    product: product,
                    quantity: qty,
                    selected: true
                });
            }
            updateCartBadge();
            
            // Hiện Toast có dấu tích xanh hoàn hảo theo thiết kế yêu cầu
            showToast("Đã thêm vào giỏ hàng thành công! ✓", "success");
        }

        function updateCartQty(productId, delta) {
            const item = state.cart.find(i => i.product.id === productId);
            if (item) {
                item.quantity += delta;
                if (item.quantity <= 0) {
                    state.cart = state.cart.filter(i => i.product.id !== productId);
                }
                renderContent();
                updateCartBadge();
            }
        }

        function toggleCartItemSelection(productId) {
            const item = state.cart.find(i => i.product.id === productId);
            if (item) {
                item.selected = !item.selected;
                renderContent();
            }
        }

        // --- LỌC VÀ SẮP XẾP SẢN PHẨM ---
        function getFilteredProducts() {
            let list = [...products];

            // Sắp xếp
            if (state.filters.sortBy === 'relevant') {
                // Giữ nguyên
            } else if (state.filters.sortBy === 'newest') {
                list.reverse(); // Đảo mẫu cho có cảm giác mới
            } else if (state.filters.sortBy === 'bestseller') {
                // Ưu tiên sản phẩm có số bán khủng
                list.sort((a, b) => {
                    const salesA = parseInt(a.sales) || 0;
                    const salesB = parseInt(b.sales) || 0;
                    return salesB - salesA;
                });
            } else if (state.filters.sortBy === 'rating-high') {
                list.sort((a, b) => b.rating - a.rating);
            } else if (state.filters.sortBy === 'rating-low') {
                list.sort((a, b) => a.rating - b.rating);
            }

            // Lọc Loại Shop
            if (state.filters.shopType.length > 0) {
                list = list.filter(p => state.filters.shopType.includes(p.shopType));
            }

            // Lọc Đánh giá
            if (state.filters.rating !== null) {
                list = list.filter(p => p.rating >= state.filters.rating);
            }

            // Lọc Nơi Bán
            if (state.filters.locations.length > 0) {
                list = list.filter(p => state.filters.locations.includes(p.locationCode));
            }

            return list;
        }

        function toggleFilterShopType(type) {
            const index = state.filters.shopType.indexOf(type);
            if (index > -1) {
                state.filters.shopType.splice(index, 1);
            } else {
                state.filters.shopType.push(type);
            }
            renderContent();
        }

        function toggleFilterLocation(loc) {
            const index = state.filters.locations.indexOf(loc);
            if (index > -1) {
                state.filters.locations.splice(index, 1);
            } else {
                state.filters.locations.push(loc);
            }
            renderContent();
        }

        function setFilterRating(val) {
            state.filters.rating = state.filters.rating === val ? null : val;
            renderContent();
        }

        function setSortBy(val) {
            state.filters.sortBy = val;
            renderContent();
        }

        let isFilterSidebarOpen = false;
        function toggleFilterSidebar() {
            isFilterSidebarOpen = !isFilterSidebarOpen;
            const sidebar = document.getElementById('filter-sidebar');
            if (sidebar) {

                    sidebar.classList.remove('translate-x-full');
                } else {
                    sidebar.classList.add('translate-x-full');
                }
            }
        }

        // --- LIÊN KẾT NGÂN HÀNG ---
        function linkBank(bankId) {
            if (state.linkedBanks.includes(bankId)) {
                showToast("Ngân hàng này đã được liên kết từ trước rồi!", "info");
                return;
            }
            state.linkedBanks.push(bankId);
            state.selectedBank = bankId;
            showToast(`Liên kết tài khoản ${bankList.find(b => b.id === bankId).name} thành công!`, "success");
            navigateTo('checkout');
        }

        // --- THỰC HIỆN ĐẶT HÀNG ---
        function placeOrder() {
            const selectedItems = state.cart.filter(item => item.selected);
            if (selectedItems.length === 0) {
                showToast("Vui lòng chọn ít nhất 1 sản phẩm để thanh toán!", "error");
                return;
            }

            const total = selectedItems.reduce((sum, item) => sum + (item.product.price * item.quantity), 0);

            if (state.paymentMethod === 'hipay') {
                if (state.hipayBalance < total) {
                    showToast("Số dư ví HiPay không đủ! Vui lòng nạp thêm tiền hoặc đổi phương thức.", "error");
                    return;
                }
                state.hipayBalance -= total;
            }

            // Đặt hàng thành công
            state.cart = state.cart.filter(item => !item.selected);
            updateCartBadge();

            // Mở Modal thành công hoành tráng
            const successModal = document.getElementById('success-modal');
            successModal.classList.remove('hidden');
            successModal.classList.add('flex');
        }

        function closeSuccessModal() {
            const successModal = document.getElementById('success-modal');
            successModal.classList.add('hidden');
            successModal.classList.remove('flex');
            navigateTo('home');

                                    <span>Phí giao hàng:</span>

                                </div>
                            </div>
                            <div class="flex justify-between items-center">
                                <div>
                                    <span class="text-[10px] text-slate-400 font-semibold block uppercase">CẦN THANH TOÁN</span>
                                    <span class="text-lg font-black text-red-500">${formatCurrency(orderTotal)}</span>
                                </div>
                                <button onclick="placeOrder()" class="px-6 py-3.5 bg-gradient-to-r from-red-600 to-orange-500 hover:opacity-95 text-white font-bold rounded-xl text-xs shadow-md transition duration-200 flex items-center space-x-1.5">
                                    <i data-lucide="shield-check" class="w-4 h-4"></i>
                                    <span>XÁC NHẬN MUA HÀNG</span>
                                </button>
                            </div>
                        </div>
                    `;
                    break;

                case 'add-bank':
                    html = `
                        <!-- HƯỚNG DẪN -->
                        <div class="bg-blue-50 border border-blue-100 rounded-2xl p-4 mb-6 flex items-start space-x-3">
                            <i data-lucide="info" class="w-5 h-5 text-blue-500 flex-shrink-0 mt-0.5"></i>
                            <div class="space-y-1">
                                <span class="text-xs font-bold text-blue-800 block">Đăng ký tài khoản và liên kết với ví</span>
                                <p class="text-[11px] text-blue-600 leading-relaxed">Hãy chọn ngân hàng thương mại uy tín dưới đây để liên kết tài khoản thanh toán siêu tốc với ví điện tử HiPay của bạn.</p>
                            </div>
                        </div>

                        <!-- DANH SÁCH NGÂN HÀNG LIÊN KẾT ĐỂ LỰA CHỌN -->
                        <div>
                            <span class="text-xs font-bold text-slate-400 uppercase tracking-wider block mb-3.5">Danh sách ngân hàng hỗ trợ</span>
                            <div class="grid grid-cols-2 gap-3">
                                ${bankList.map(bank => {
                                    const isLinked = state.linkedBanks.includes(bank.id);
                                    return `
                                        <div onclick="linkBank('${bank.id}')" class="bg-white border p-4 rounded-2xl transition duration-150 text-center relative flex flex-col items-center justify-between min-h-[140px] cursor-pointer ${isLinked ? 'border-red-500 bg-red-50/10' : 'border-slate-100 hover:border-slate-300 shadow-sm'}">
                                            <div class="w-14 h-14 bg-white border border-slate-100 p-1.5 rounded-xl flex items-center justify-center overflow-hidden shadow-sm">
                                                <img src="${bank.logo}" alt="${bank.name}" class="w-full h-full object-contain">
                                            </div>
                                            <div class="mt-2.5">
                                                <span class="text-xs font-bold text-slate-800 block">${bank.name}</span>
                                                <span class="text-[9px] text-slate-400">Liên kết ngay</span>
                                            </div>
                                            
                                            ${isLinked ? `
                                                <span class="absolute top-2 right-2 bg-red-500 text-white rounded-full p-0.5 shadow-sm">
                                                    <i data-lucide="check" class="w-3.5 h-3.5"></i>
                                                </span>
                                            ` : ''}
                                        </div>
                                    `;
                                }).join('')}
                            </div>
                        </div>
                    `;
                    break;
            }

            main.innerHTML = html;
            lucide.createIcons();
        }

        // --- HÀM HỖ TRỢ XỬ LÝ TRÊN GIAO DIỆN CHI TIẾT ---
        function selectDetailImage(idx) {
            state.selectedDetailImageIdx = idx;
            renderContent();
            
            // Highlight viền đỏ cho ảnh chính theo yêu cầu
            const mainImg = document.getElementById('main-product-image');
            if (mainImg) {
                mainImg.classList.add('border-2', 'border-red-500');
            }
        }

        function updateDetailQty(delta) {
            state.detailQuantity += delta;
            if (state.detailQuantity < 1) state.detailQuantity = 1;
            const el = document.getElementById('detail-qty');
            if (el) el.innerText = state.detailQuantity;
        }

        function toggleFavorite(id) {
            const btn = document.getElementById('fav-btn');
            if (btn) {
                if (btn.classList.contains('text-red-500')) {
                    btn.className = "p-2.5 rounded-full bg-slate-50 text-slate-400 hover:text-red-500 shadow-inner transition flex-shrink-0";
                    showToast("Đã xóa khỏi danh sách yêu thích!", "info");
                } else {
                    btn.className = "p-2.5 rounded-full bg-slate-50 text-red-500 hover:text-red-500 shadow-inner transition flex-shrink-0";
                    showToast("Đã thêm vào danh sách yêu thích!", "success");
                }
            }
        }

        function handleAddToCartClick() {
            const p = state.selectedProduct || products[0];
            addToCart(p, state.detailQuantity);
        }

        // --- HÀM HỖ TRỢ XỬ LÝ TRÊN GIAO DIỆN THANH TOÁN ---
        function selectPaymentMethod(method) {
            state.paymentMethod = method;
            renderContent();
        }

        function selectLinkedBank(bankId) {
            state.paymentMethod = 'bank';
            state.selectedBank = bankId;
            renderContent();
        }

        function addFunds(event) {
            event.stopPropagation();
            state.hipayBalance += 5000000; // Nạp thêm 5 triệu VND mỗi lần click
            renderContent();
            showToast("Đã nạp 5.000.000₫ vào tài khoản ví HiPay!", "success");
        }

        function calculateSelectedTotal() {
            return state.cart
                .filter(item => item.selected)
                .reduce((sum, item) => sum + (item.product.price * item.quantity), 0);
        }

        function resetFilters() {
            state.filters = {
                sortBy: 'relevant',
                shopType: [],
                rating: null,
                locations: []
            };
            renderContent();
            showToast("Đã thiết lập lại toàn bộ bộ lọc!", "info");
        }


        // --- CHẠY LẦN ĐẦU KHI TRANG TẢI XONG ---
        window.onload = function() {
            navigateTo('home');
        };
    </script>

    <!-- SIDEBAR / MODAL / ELEMENT ĐẶC BIỆT CỦA TOÀN BỘ APP -->
    <!-- MODAL ĐẶT HÀNG THÀNH CÔNG -->
    <div id="success-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[100] hidden items-center justify-center p-4">
        <div class="bg-white rounded-3xl p-6 w-full max-w-xs text-center shadow-2xl border border-slate-100 transform scale-100 transition-all">
            <div class="w-16 h-16 bg-emerald-100 text-emerald-500 rounded-full flex items-center justify-center mx-auto mb-4 shadow">
                <i data-lucide="check" class="w-10 h-10"></i>
            </div>
            <h3 class="text-lg font-black text-slate-800">Đặt hàng thành công!</h3>
            <p class="text-xs text-slate-500 mt-2 leading-relaxed">Cảm ơn bạn đã tin tưởng mua sắm ảo tại <strong>HiShop</strong>. Đơn hàng của bạn đang được xử lý cực tốc.</p>
            
            <div class="mt-6 flex flex-col space-y-2">
                <button onclick="closeSuccessModal()" class="w-full py-3 bg-red-500 hover:bg-red-600 text-white font-bold rounded-2xl text-xs transition duration-150 shadow-md">
                    Tiếp tục mua sắm
                </button>
            </div>
        </div>
    </div>

</body>
</html>
